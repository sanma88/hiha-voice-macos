<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hi-ha.be — UI Kit site web</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../design-system/colors_and_type.css">
<link rel="stylesheet" href="kit.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Shared.jsx"></script>
<script type="text/babel" src="HomePage.jsx"></script>
<script type="text/babel" src="CalendarPage.jsx"></script>
<script type="text/babel" src="ContactPage.jsx"></script>
<script type="text/babel" src="AdminPage.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const { theme, toggle } = useTheme();
  const [view, setView] = useState('home');
  const [animate, setAnimate] = useState(false);

  // Le site (home/contact/calendrier) partage le header+footer. L'admin est plein écran.
  const isSite = view === 'home' || view === 'contact' || view === 'calendrier';

  React.useEffect(() => { window.scrollTo(0, 0); }, [view]);
  React.useEffect(() => {
    setAnimate(false);
    const t = setTimeout(() => setAnimate(true), 40);
    return () => clearTimeout(t);
  }, [view]);

  return (
    <div className={`app ${animate ? 'animate' : ''}`}>
      <div className="page-halo"></div>

      {isSite && <Header theme={theme} toggle={toggle} onNavigate={setView} />}

      {view === 'home' && <HomePage onNavigate={setView} />}
      {view === 'calendrier' && <CalendarPage onNavigate={setView} />}
      {view === 'contact' && <ContactPage />}
      {view === 'admin' && <AdminPage theme={theme} toggle={toggle} onNavigate={setView} />}

      {isSite && <Footer onNavigate={setView} />}

      <div className="viewswitch">
        <button className={view === 'home' ? 'active' : ''} onClick={() => setView('home')}>Site</button>
        <button className={view === 'calendrier' ? 'active' : ''} onClick={() => setView('calendrier')}>Calendrier</button>
        <button className={view === 'contact' ? 'active' : ''} onClick={() => setView('contact')}>Contact</button>
        <button className={view === 'admin' ? 'active' : ''} onClick={() => setView('admin')}>Admin</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
